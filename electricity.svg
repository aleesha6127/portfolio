<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="chart-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <path d="M 0,60 L 800,60 M 0,120 L 800,120 M 0,180 L 800,180 M 0,240 L 800,240 M 0,300 L 800,300 M 0,360 L 800,360 M 0,420 L 800,420 M 0,480 L 800,480" />
    <path d="M 60,0 L 60,500 M 120,0 L 120,500 M 180,0 L 180,500 M 240,0 L 240,500 M 300,0 L 300,500 M 360,0 L 360,500 M 420,0 L 420,500 M 480,0 L 480,500 M 540,0 L 540,500 M 600,0 L 600,500 M 660,0 L 660,500 M 720,0 L 720,500 M 780,0 L 780,500" />
  </g>

  <!-- Title / Logo Panel -->
  <rect x="40" y="40" width="720" height="70" rx="12" fill="#1c1917" fill-opacity="0.7" stroke="#2e2a24" stroke-width="1.5" />
  <!-- Bolt icon inside circle -->
  <circle cx="80" cy="75" r="20" fill="url(#accent-grad)" />
  <path d="M 80,63 L 72,75 L 79,75 L 78,87 L 88,73 L 81,73 Z" fill="#ffffff" />
  <text x="115" y="80" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">PowerStats Billing Portal</text>
  <text x="730" y="80" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#a8a29e" text-anchor="end">BILLING PERIOD: JUNE 2026</text>

  <!-- Left Side: Digital Meter Gauge -->
  <g transform="translate(40, 140)">
    <rect width="280" height="320" rx="12" fill="#141414" stroke="#2e2a24" stroke-width="1.5" />
    
    <!-- Digital Screen -->
    <rect x="20" y="20" width="240" height="100" rx="6" fill="#0c0a09" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1" />
    <text x="35" y="45" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" fill="#78716c">CURRENT READINGS</text>
    <text x="35" y="90" font-family="'Courier New', Courier, monospace" font-size="36" font-weight="bold" fill="#f59e0b" filter="url(#glow)">04825.9</text>
    <text x="245" y="90" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="end">kWh</text>

    <!-- Detailed Stats -->
    <text x="20" y="160" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#a8a29e">CONSUMPTION DETAILS</text>
    
    <!-- Row 1 -->
    <text x="20" y="195" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#78716c">Current Load:</text>
    <text x="260" y="195" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="end">2.84 kW</text>
    
    <!-- Row 2 -->
    <text x="20" y="235" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#78716c">Voltage Status:</text>
    <text x="260" y="235" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="end">230V Stable</text>
    
    <!-- Row 3 -->
    <text x="20" y="275" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#78716c">Est. Bill Amount:</text>
    <text x="260" y="275" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="bold" fill="#f97316" text-anchor="end" filter="url(#glow)">$142.50</text>
  </g>

  <!-- Right Side: Consumption Graph & Analytics -->
  <g transform="translate(350, 140)">
    <rect width="410" height="320" rx="12" fill="#141414" stroke="#2e2a24" stroke-width="1.5" />
    <text x="25" y="35" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#a8a29e">DAILY USAGE ANALYTICS</text>
    
    <!-- Bar Charts (Mock) -->
    <!-- Gridlines for Chart -->
    <line x1="50" y1="90" x2="380" y2="90" stroke="#27272a" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="50" y1="160" x2="380" y2="160" stroke="#27272a" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="50" y1="230" x2="380" y2="230" stroke="#27272a" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="50" y1="260" x2="380" y2="260" stroke="#3f3f46" stroke-width="1.5" />

    <!-- Chart Bars -->
    <!-- Mon -->
    <rect x="70" y="140" width="22" height="120" rx="3" fill="url(#chart-grad)" />
    <text x="81" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Mon</text>
    <!-- Tue -->
    <rect x="115" y="100" width="22" height="160" rx="3" fill="url(#chart-grad)" />
    <text x="126" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Tue</text>
    <!-- Wed -->
    <rect x="160" y="170" width="22" height="90" rx="3" fill="url(#chart-grad)" />
    <text x="171" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Wed</text>
    <!-- Thu -->
    <rect x="205" y="70" width="22" height="190" rx="3" fill="url(#accent-grad)" filter="url(#glow)" />
    <text x="216" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#f59e0b" font-weight="bold" text-anchor="middle">Thu</text>
    <!-- Fri -->
    <rect x="250" y="110" width="22" height="150" rx="3" fill="url(#chart-grad)" />
    <text x="261" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Fri</text>
    <!-- Sat -->
    <rect x="295" y="160" width="22" height="100" rx="3" fill="url(#chart-grad)" />
    <text x="306" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Sat</text>
    <!-- Sun -->
    <rect x="340" y="190" width="22" height="70" rx="3" fill="url(#chart-grad)" />
    <text x="351" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#71717a" text-anchor="middle">Sun</text>

    <!-- Peak Alert Badge -->
    <rect x="240" y="18" width="140" height="25" rx="12" fill="#7f1d1d" fill-opacity="0.8" stroke="#ef4444" stroke-opacity="0.5" stroke-width="1" />
    <text x="310" y="34" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" fill="#fca5a5" text-anchor="middle">PEAK DEMAND: THURSDAY</text>
  </g>
</svg>
