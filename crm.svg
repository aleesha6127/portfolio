<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="pipeline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" />
    <path d="M 50,0 L 50,500 M 100,0 L 100,500 M 150,0 L 150,500 M 200,0 L 200,500 M 250,0 L 250,500 M 300,0 L 300,500 M 350,0 L 350,500 M 400,0 L 400,500 M 450,0 L 450,500 M 500,0 L 500,500 M 550,0 L 550,500 M 600,0 L 600,500 M 650,0 L 650,500 M 700,0 L 700,500 M 750,0 L 750,500" />
  </g>

  <!-- Large Central Dashboard Panel -->
  <rect x="50" y="50" width="700" height="400" rx="12" fill="#0f172a" fill-opacity="0.6" stroke="#1e293b" stroke-width="1.5" />

  <!-- CRM Dashboard Header -->
  <rect x="50" y="50" width="700" height="60" rx="12" fill="#111827" fill-opacity="0.8" />
  <circle cx="85" cy="80" r="15" fill="url(#accent-grad)" />
  <!-- AI Funnel Star icon -->
  <path d="M 85,72 L 87,77 L 92,77 L 88,81 L 90,86 L 85,83 L 80,86 L 82,81 L 78,77 L 83,77 Z" fill="#ffffff" />
  <text x="115" y="85" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#f8fafc">NovaCRM AI Engine</text>
  <rect x="580" y="65" width="140" height="30" rx="15" fill="#1e1b4b" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1" />
  <text x="650" y="84" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ec4899" text-anchor="middle" filter="url(#glow)">AI AUDIT ACTIVE</text>

  <!-- Left: Pipeline Stage Funnel -->
  <g transform="translate(80, 140)">
    <rect width="300" height="280" rx="8" fill="#1e293b" fill-opacity="0.5" stroke="#334155" stroke-width="1" />
    <text x="20" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">DEAL PIPELINE CONVERSION</text>
    
    <!-- Stage Funnel polygons -->
    <!-- Leads (Top wide block) -->
    <polygon points="40,60 260,60 230,100 70,100" fill="url(#pipeline-grad)" />
    <text x="150" y="80" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">1. Leads: $240,000 (100%)</text>
    
    <!-- Qualified -->
    <polygon points="75,105 225,105 200,145 100,145" fill="url(#pipeline-grad)" fill-opacity="0.8" />
    <text x="150" y="125" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">2. Qualified: $135,000 (56%)</text>
    
    <!-- Proposal -->
    <polygon points="105,150 195,150 175,190 125,190" fill="url(#pipeline-grad)" fill-opacity="0.6" />
    <text x="150" y="170" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">3. Proposal: $82,000 (34%)</text>
    
    <!-- Closed (Bottom narrow block) -->
    <polygon points="130,195 170,195 160,235 140,235" fill="url(#accent-grad)" filter="url(#glow)" />
    <text x="150" y="215" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">4. Won: $48,000 (20%)</text>
  </g>

  <!-- Right: AI Smart Recommendations Card -->
  <g transform="translate(410, 140)">
    <rect width="310" height="280" rx="8" fill="#14112c" stroke="#312e81" stroke-width="1.5" />
    
    <!-- Header -->
    <text x="20" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#a78bfa" letter-spacing="0.5">AI LEAD SCORE PREDICTION</text>
    
    <!-- Lead 1 -->
    <g transform="translate(20, 55)">
      <rect width="270" height="65" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
      <circle cx="25" cy="32" r="14" fill="#ec4899" />
      <text x="25" y="36" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">JD</text>
      <text x="50" y="28" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">John Doe Corp</text>
      <text x="50" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8">Deal value: $25,000</text>
      <rect x="210" y="20" width="45" height="25" rx="12" fill="#14532d" />
      <text x="232.5" y="36" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">94%</text>
    </g>

    <!-- Lead 2 -->
    <g transform="translate(20, 130)">
      <rect width="270" height="65" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
      <circle cx="25" cy="32" r="14" fill="#a855f7" />
      <text x="25" y="36" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">MS</text>
      <text x="50" y="28" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0">Morgan Software</text>
      <text x="50" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" fill="#94a3b8">Deal value: $18,500</text>
      <rect x="210" y="20" width="45" height="25" rx="12" fill="#14532d" />
      <text x="232.5" y="36" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">87%</text>
    </g>

    <!-- Lead 3 -->
    <g transform="translate(20, 205)">
      <rect width="270" height="60" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
      <!-- AI Insight message box -->
      <path d="M 15,18 L 15,42 M 25,23 L 245,23" stroke="#a78bfa" stroke-width="1" />
      <text x="20" y="25" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-style="italic" fill="#a78bfa">💡 AI Tip: Contact John Doe Corp today to lock down proposal stage.</text>
    </g>
  </g>
</svg>
